server:
  port: ${SYNC_SERVER_PORT:10456}

spring:
  application:
    name: sync-data
  main:
    banner-mode: off

logging:
  level:
    root: INFO
    org.springframework.boot.SpringApplication: INFO
    org.springframework.boot.availability: INFO
    org.springframework.boot.autoconfigure: WARN
    org.springframework.jdbc.core: WARN

sync:
  batch-size: 500
  dry-run: false
  truncate-before-sync: false
  populate-search-index: true
  reset-password: ChangeMe@123
  incremental:
    mq:
      enabled: false
      topic: wk-crm-binlog
      consumer-group: ai-crm-sync-data
  rocketmq:
    enabled: ${SYNC_ROCKETMQ_ENABLED:false}
    name-server: ${SYNC_ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
    topic: ${SYNC_ROCKETMQ_TOPIC:crm-aicrm-sync-events}
    crm-to-aicrm:
      topic: ${SYNC_ROCKETMQ_CRM_TO_AICRM_TOPIC:}
      tag: ${SYNC_ROCKETMQ_CRM_TO_AICRM_TAG:crm-to-aicrm}
      consumer-group: ${SYNC_ROCKETMQ_CRM_TO_AICRM_GROUP:sync-data-crm-to-aicrm}
    aicrm-to-crm:
      topic: ${SYNC_ROCKETMQ_AICRM_TO_CRM_TOPIC:}
      tag: ${SYNC_ROCKETMQ_AICRM_TO_CRM_TAG:aicrm-to-crm}
      producer-group: ${SYNC_ROCKETMQ_AICRM_TO_CRM_PRODUCER_GROUP:sync-data-aicrm-to-crm}
  old-crm:
    jdbc-url: ${SYNC_OLD_JDBC_URL:jdbc:mysql://192.168.1.210:3306/wk_crm?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull}
    username: ${SYNC_OLD_USERNAME:root}
    password: ${SYNC_OLD_PASSWORD:123456}
    maximum-pool-size: 5
  target:
    jdbc-url: ${SYNC_TARGET_JDBC_URL:jdbc:postgresql://39.97.38.69:5432/wk_ai_crm_test}
    username: ${SYNC_TARGET_USERNAME:postgres}
    password: ${SYNC_TARGET_PASSWORD:postgres123!@#}
    maximum-pool-size: 8
