server:
  port: 8088

spring:
  application:
    name: manager
  datasource:
    url: jdbc:postgresql://postgres:5432/wk_ai_crm
    username: postgres
    password: postgres123!@#
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 100
      minimum-idle: 10
  jackson:
    dateFormat: yyyy-MM-dd hh:mm:ss
    timeZone: GMT+8
  data:
    redis:
      host: redis
      port: 6379
      password: redis123!@#
      database: 7
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  ai:
    model:
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${DASHSCOPE_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:qwen-max}
          temperature: 0.7
          max-tokens: 4096
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

logging:
  config: classpath:logback-spring.xml

token:
  header: Manager-Token
  secret: abcdefghijklmnopqrstuvwxyz
  expireTime: 10080
  multi-login-enabled: false

knife4j:
  enable: true

file:
  upload-path: ./uploads

mail:
  integration:
    encryption-key: ${MAIL_CREDENTIAL_ENCRYPTION_KEY:aicrm-single-mail-key-change-me}
    proxy:
      enabled: ${MAIL_PROXY_ENABLED:false}
      url: ${MAIL_PROXY_URL:}

external-auth:
  proxy:
    enabled: ${EXTERNAL_AUTH_PROXY_ENABLED:false}
    url: ${EXTERNAL_AUTH_PROXY_URL:}
  frontend-redirect-uri: ${EXTERNAL_AUTH_FRONTEND_REDIRECT_URI:}
  state-ttl-seconds: 600
  ticket-ttl-seconds: 300
  google:
    enabled: ${EXTERNAL_AUTH_GOOGLE_ENABLED:false}
    client-id: ${EXTERNAL_AUTH_GOOGLE_CLIENT_ID:}
    client-secret: ${EXTERNAL_AUTH_GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${EXTERNAL_AUTH_GOOGLE_REDIRECT_URI:}
  outlook:
    enabled: ${EXTERNAL_AUTH_OUTLOOK_ENABLED:false}
    client-id: ${EXTERNAL_AUTH_OUTLOOK_CLIENT_ID:}
    client-secret: ${EXTERNAL_AUTH_OUTLOOK_CLIENT_SECRET:}
    tenant: ${EXTERNAL_AUTH_OUTLOOK_TENANT:common}
    redirect-uri: ${EXTERNAL_AUTH_OUTLOOK_REDIRECT_URI:}
  wechat:
    enabled: ${EXTERNAL_AUTH_WECHAT_ENABLED:false}
    client-id: ${EXTERNAL_AUTH_WECHAT_CLIENT_ID:}
    client-secret: ${EXTERNAL_AUTH_WECHAT_CLIENT_SECRET:}
    redirect-uri: ${EXTERNAL_AUTH_WECHAT_REDIRECT_URI:}

minio:
  enabled: true
  endpoint: http://minio:9000
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:/s3}
  access-key: minioadmin
  secret-key: minioadmin
  bucket: ai-crm
  use-presigned-url: true
  presigned-expiry: 3600

oidc:
  client-id: minio-console
  client-secret: minio-console-secret-key-2024
  minio-console-port: 9001
  code-expiry: 300
  token-expiry: 3600
  session-cookie: CRM_SESSION

weknora:
  enabled: ${WEKNORA_ENABLED:true}
  base-url: ${WEKNORA_BASE_URL:http://frontend/api/v1}
  api-key: ${WEKNORA_API_KEY:}
  knowledge-base-id: ${WEKNORA_KNOWLEDGE_BASE_ID:}
  init-models:
    chat:
      name: ${WEKNORA_CHAT_MODEL:qwen-max}
      source: remote
      provider: aliyun
      api-key: ${WEKNORA_CHAT_MODEL_API_KEY:${DASHSCOPE_API_KEY:}}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    embedding:
      name: text-embedding-v3
      source: remote
      provider: aliyun
      api-key: ${WEKNORA_EMBEDDING_MODEL_API_KEY:${DASHSCOPE_API_KEY:}}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      dimension: 1024
  search:
    match-count: 5
    vector-threshold: 0.5
    auto-rag-enabled: true

wukong:
  captcha:
    login-required: false
