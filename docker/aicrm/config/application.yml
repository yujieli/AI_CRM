server:
  port: 8088
spring:
  application:
    name: manager
  datasource:
    url: jdbc:postgresql://postgres:5432/wk_ai_crm
    username: postgres
    password: postgres123!@#
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 100
      minimum-idle: 10
  jackson:
    dateFormat: yyyy-MM-dd hh:mm:ss
    timeZone: GMT+8
  data:
    redis:
      host: redis
      port: 6379
      password: redis123!@#
      database: 7
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  ai:
    model:
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${DASHSCOPE_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: qwen3.5-plus
          temperature: 0.7
          max-tokens: 2048
logging:
  config: classpath:logback-spring.xml
# token配置
token:
  # 令牌自定义标识
  header: Manager-Token
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 10080
  # 是否允许同一账号多端同时登录
  multi-login-enabled: false
knife4j:
  enable: true

# 文件上传配置
file:
  upload-path: ./uploads

mail:
  integration:
    encryption-key: ${MAIL_CREDENTIAL_ENCRYPTION_KEY:}

external-auth:
  proxy:
    enabled: ${EXTERNAL_AUTH_PROXY_ENABLED:false}
    url: ${EXTERNAL_AUTH_PROXY_URL:}
  google:
    enabled: ${EXTERNAL_AUTH_GOOGLE_ENABLED:false}
    client-id: ${EXTERNAL_AUTH_GOOGLE_CLIENT_ID:}
    client-secret: ${EXTERNAL_AUTH_GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${EXTERNAL_AUTH_GOOGLE_REDIRECT_URI:}
  outlook:
    enabled: ${EXTERNAL_AUTH_OUTLOOK_ENABLED:false}
    client-id: ${EXTERNAL_AUTH_OUTLOOK_CLIENT_ID:}
    client-secret: ${EXTERNAL_AUTH_OUTLOOK_CLIENT_SECRET:}
    tenant: ${EXTERNAL_AUTH_OUTLOOK_TENANT:common}
    redirect-uri: ${EXTERNAL_AUTH_OUTLOOK_REDIRECT_URI:}
  wecom:
    enabled: ${EXTERNAL_AUTH_WECOM_ENABLED:false}
    corp-id: ${EXTERNAL_AUTH_WECOM_CORP_ID:}
    agent-id: ${EXTERNAL_AUTH_WECOM_AGENT_ID:}
    client-secret: ${EXTERNAL_AUTH_WECOM_SECRET:}
    redirect-uri: ${EXTERNAL_AUTH_WECOM_REDIRECT_URI:}

# MinIO 对象存储配置 (S3 兼容，同时支持 RustFS)
wecom:
  open-platform:
    enabled: ${WECOM_OPEN_PLATFORM_ENABLED:true}
    suite-id: ${WECOM_OPEN_PLATFORM_SUITE_ID:wwc241ee78c24021e7}
    suite-secret: ${WECOM_OPEN_PLATFORM_SUITE_SECRET:aqz6mm29b7OcjxdW7-11wbmS_7DLN7RQubN3qArF6d0}
    provider-corp-id: ${WECOM_OPEN_PLATFORM_PROVIDER_CORP_ID:wwbc43295670db368a}
    provider-secret: ${WECOM_OPEN_PLATFORM_PROVIDER_SECRET:${WECOM_OPEN_PLATFORM_SUITE_SECRET:aqz6mm29b7OcjxdW7-11wbmS_7DLN7RQubN3qArF6d0}}
    token: ${WECOM_OPEN_PLATFORM_TOKEN:5nTAZePlAZ5EPfOP8zEemj}
    encoding-aes-key: ${WECOM_OPEN_PLATFORM_ENCODING_AES_KEY:gGal1ShzR4QSiZoAAJlyurMGZSC70bsPwJdhqcuTq7F}
    callback-url: ${WECOM_OPEN_PLATFORM_CALLBACK_URL:https://aicrm-saas.5kcrm.cn/crmapi/wecom/open/callback}
    auth-redirect-uri: ${WECOM_OPEN_PLATFORM_AUTH_REDIRECT_URI:https://aicrm-saas.5kcrm.cn/crmapi/wecom/open/auth/callback}
    login-redirect-uri: ${WECOM_OPEN_PLATFORM_LOGIN_REDIRECT_URI:https://aicrm-saas.5kcrm.cn/crmapi/auth/external/wecom/callback}
    frontend-redirect-uri: ${WECOM_OPEN_PLATFORM_FRONTEND_REDIRECT_URI:https://aicrm-saas.5kcrm.cn/#/wecom/scrm}
    auth-type: ${WECOM_OPEN_PLATFORM_AUTH_TYPE:1}
    state-ttl-seconds: ${WECOM_OPEN_PLATFORM_STATE_TTL_SECONDS:600}
    token-cache-ttl-buffer-seconds: ${WECOM_OPEN_PLATFORM_TOKEN_CACHE_TTL_BUFFER_SECONDS:300}
  dev-callback:
    # 代开发模板回调（/wecom/dev/callback）的 Token / EncodingAESKey，必须与企微服务商后台「代开发模板回调配置」一致。
    # 可在此直接填写明文，或用环境变量 WECOM_DEV_CALLBACK_TOKEN / WECOM_DEV_CALLBACK_AES_KEY 注入。
    token: ${WECOM_DEV_CALLBACK_TOKEN:}
    encoding-aes-key: ${WECOM_DEV_CALLBACK_AES_KEY:}

minio:
  # 是否启用 MinIO（设为 false 使用本地文件存储）
  enabled: true
  # MinIO/RustFS 服务地址（内部，后端服务端操作用）
  endpoint: http://minio:9000
  # 面向浏览器的外部访问地址（presigned URL 用，通过 nginx /s3/ 代理）
  # 如果有域名，改为 http://yourdomain.com/s3
  public-endpoint: http://${HOST_IP}/s3
  # Access Key
  access-key: minioadmin
  # Secret Key
  secret-key: minioadmin
  # 存储桶名称
  bucket: ai-crm
  # 下载是否使用预签名 URL
  use-presigned-url: true
  # 预签名 URL 有效期（秒）
  presigned-expiry: 3600

# OIDC Provider 配置 (用于 MinIO SSO 登录)
# 注意：issuer、redirect-uri、frontend-login-url 已改为从请求中动态获取，无需配置
oidc:
  # OIDC 客户端 ID（需与 MinIO 环境变量一致）
  client-id: minio-console
  # OIDC 客户端密钥（需与 MinIO 环境变量一致）
  client-secret: minio-console-secret-key-2024
  # MinIO Console 端口（用于动态生成 redirect_uri）
  minio-console-port: 9001
  # 授权码有效期（秒）
  code-expiry: 300
  # Access Token 有效期（秒）
  token-expiry: 3600
  # Session Cookie 名称
  session-cookie: CRM_SESSION

token-purchase:
  enabled: ${TOKEN_PURCHASE_ENABLED:true}
  order-expire-minutes: ${TOKEN_PURCHASE_ORDER_EXPIRE_MINUTES:30}
  plans:
    - id: starter-100w
      name: 1,000,000 积分加油包
      description: 1,000,000 积分
      credit-amount: 1000000
      price-fen: 6000
      sort: 1
      enabled: true
  wechat:
    enabled: ${TOKEN_PURCHASE_WECHAT_ENABLED:false}
    gateway: ${TOKEN_PURCHASE_WECHAT_GATEWAY:https://api.mch.weixin.qq.com}
    app-id: ${TOKEN_PURCHASE_WECHAT_APP_ID:}
    merchant-id: ${TOKEN_PURCHASE_WECHAT_MERCHANT_ID:1607069185}
    merchant-serial-no: ${TOKEN_PURCHASE_WECHAT_MERCHANT_SERIAL_NO:770eda7aa17cc5c21c9cc7e9c852ef5ca4f785d9}
    # 商户私钥支持直接填写 PEM 内容，或通过 *_PATH 指向文件；默认目录为当前路径下 src/main/resources/cert
    key-path: ${TOKEN_PURCHASE_WECHAT_KEY_PATH:src/main/resources/cert}
    private-key: ${TOKEN_PURCHASE_WECHAT_PRIVATE_KEY:}
    private-key-path: ${TOKEN_PURCHASE_WECHAT_PRIVATE_KEY_PATH:apiclient_key.pem}
    api-v3-key: ${TOKEN_PURCHASE_WECHAT_API_V3_KEY:}
    notify-url: ${TOKEN_PURCHASE_WECHAT_NOTIFY_URL:}
  alipay:
    enabled: ${TOKEN_PURCHASE_ALIPAY_ENABLED:false}
    gateway: ${TOKEN_PURCHASE_ALIPAY_GATEWAY:https://openapi.alipay.com/gateway.do}
    app-id: ${TOKEN_PURCHASE_ALIPAY_APP_ID:}
    private-key: ${TOKEN_PURCHASE_ALIPAY_PRIVATE_KEY:}
    alipay-public-key: ${TOKEN_PURCHASE_ALIPAY_PUBLIC_KEY:}
    seller-id: ${TOKEN_PURCHASE_ALIPAY_SELLER_ID:}
    qrcode-width: ${TOKEN_PURCHASE_ALIPAY_QRCODE_WIDTH:200}
    notify-url: ${TOKEN_PURCHASE_ALIPAY_NOTIFY_URL:}

# WeKnora 知识库服务配置
weknora:
  # 是否启用 WeKnora 集成（设为 false 可禁用，仅使用本地存储）
  enabled: true
  # WeKnora API 基础 URL
  base-url: http://frontend/api/v1
  # WeKnora API Key（从 WeKnora 管理界面获取）
  api-key: sk-NgkVLxONp7oNgyG3lm-EBGSLdDlGBCgJrEUW4ncowLRNlaLc
  init-models:
    chat:
      name: qwen3.5-plus
      source: remote
      provider: aliyun
      api-key: ${DASHSCOPE_API_KEY:sk-111111}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    embedding:
      name: text-embedding-v3
      source: remote
      provider: aliyun
      api-key: ${DASHSCOPE_API_KEY:sk-111111}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      dimension: 1024
  # 默认知识库 ID（CRM 文档将上传到此知识库）
  knowledge-base-id: 398435ff-1a23-49ab-8571-91fa89f0f8e3
  # 搜索配置
  search:
    # 检索返回的最大结果数
    match-count: 5
    # 向量相似度阈值 (0-1)，只返回相似度高于此阈值的结果
    vector-threshold: 0.5
    # 是否启用自动 RAG（启用后每次对话都会自动检索相关文档）
    auto-rag-enabled: true
