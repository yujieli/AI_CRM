server:
  port: 8088

spring:
  application:
    name: manager
  datasource:
    url: jdbc:postgresql://192.168.1.170:5432/wk_ai_crm_saas
    username: postgres
    password: postgres123!@#
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 100
      minimum-idle: 10
  jackson:
    dateFormat: yyyy-MM-dd hh:mm:ss
    timeZone: GMT+8
  data:
    redis:
      host: 192.168.1.116
      port: 6379
      password: 123456
      database: 7
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  ai:
    model:
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ""
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      chat:
        options:
          model: qwen-max
          temperature: 0.7
          max-tokens: 4096
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

logging:
  config: classpath:logback-spring.xml

token:
  header: Manager-Token
  secret: abcdefghijklmnopqrstuvwxyz
  expireTime: 10080

knife4j:
  enable: true

file:
  upload-path: ./uploads

minio:
  enabled: true
  endpoint: http://192.168.1.170:9000
  public-endpoint: https://aicrm-saas.5kcrm.cn/s3/
  access-key: minioadmin
  secret-key: minioadmin
  bucket: ai-crm
  use-presigned-url: true
  presigned-expiry: 3600

oidc:
  client-id: minio-console
  client-secret: minio-console-secret-key-2024
  minio-console-port: 9001
  code-expiry: 300
  token-expiry: 3600
  session-cookie: CRM_SESSION

weknora:
  enabled: true
  base-url: http://39.97.38.69/api/v1
  api-key: ${WEKNORA_API_KEY:}
  init-models:
    chat:
      name: qwen-max
      source: remote
      provider: aliyun
      api-key: ${WEKNORA_CHAT_MODEL_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    embedding:
      name: text-embedding-v3
      source: remote
      provider: aliyun
      api-key: ${WEKNORA_EMBEDDING_MODEL_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      dimension: 1024
  search:
    match-count: 5
    vector-threshold: 0.5
    auto-rag-enabled: true
