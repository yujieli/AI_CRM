server:
  port: 8088
spring:
  application:
    name: ai_crm
  datasource:
    url: jdbc:postgresql://39.97.38.69:5432/wk_ai_crm_test
    username: postgres
    password: postgres123!@#
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 100
      minimum-idle: 10
  jackson:
    dateFormat: yyyy-MM-dd hh:mm:ss
    timeZone: GMT+8
  data:
    redis:
      host: 192.168.1.116
      port: 6379
      password: 123456
      database: 7
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  ai:
    model:
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${DASHSCOPE_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: qwen3.6-plus
          temperature: 0.7
          max-tokens: 4096
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 已有数据库首次接入 Flyway 时，自动标记 baseline，跳过 V1
    baseline-on-migrate: true
    baseline-version: 1
system-ai:
  openai:
    proxy-base-url: ${SYSTEM_OPENAI_PROXY_BASE_URL:http://52.198.150.151}
  providers:
    openai:
      enabled: true
      base-url: http://52.198.150.151
      api-key: ${SYSTEM_OPENAI_API_KEY:${OPENAI_API_KEY:}}
      model: gpt-5.4
    ark:
      enabled: true
      base-url: https://ark.cn-beijing.volces.com/api/v3
      api-key: ${SYSTEM_ARK_API_KEY:}
      model: doubao-seed-2-0-pro-260215
    deepseek:
      enabled: true
      base-url: https://api.deepseek.com
      api-key: ${SYSTEM_DEEPSEEK_API_KEY:${DEEPSEEK_API_KEY:}}
      model: deepseek-v4-pro
    moonshot:
      enabled: true
      base-url: https://api.moonshot.cn
      api-key: ${SYSTEM_KIMI_API_KEY:${KIMI_API_KEY:${MOONSHOT_API_KEY:}}}
      model: kimi-k2.6
logging:
  config: classpath:logback-spring.xml
# token配置
token:
  # 令牌自定义标识
  header: Manager-Token
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 10080
  # 是否允许同一账号多端同时登录
  multi-login-enabled: false
knife4j:
  enable: true

# 文件上传配置
file:
  upload-path: ./uploads

mail:
  integration:
    # Stable secret used to encrypt mailbox passwords and OAuth tokens stored in crm_mail_account.
    encryption-key: ${MAIL_CREDENTIAL_ENCRYPTION_KEY:Gr73nKSHNpwKsD9367}
    max-concurrent-sync: ${MAIL_MAX_CONCURRENT_SYNC:20}

media-analysis:
  ffmpeg:
    path: "D:/software/ffmpeg/bin/ffmpeg.exe"
  ffprobe:
    path: "D:/software/ffmpeg/bin/ffprobe.exe"
  video:
    max-frames: ${MEDIA_ANALYSIS_VIDEO_MAX_FRAMES:5}
    timeout-seconds: ${MEDIA_ANALYSIS_VIDEO_TIMEOUT_SECONDS:60}

# 云邮件配置
cloud:
  mail:
    # true 时走真实邮件发送；false 时仅在日志中输出验证码，便于本地联调
    enabled: true
    region-id: cn-hangzhou
    access-key-id: ${ALIYUN_DM_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_DM_ACCESS_KEY_SECRET:}
    account-name: ${ALIYUN_DM_ACCOUNT_NAME:wukong@service.72crm.com}
    from-alias: AI CRM
    reply-to-address: false

# MinIO 对象存储配置 (S3 兼容，同时支持 RustFS)
minio:
  # 是否启用 MinIO（设为 false 使用本地文件存储）
  enabled: true
  # MinIO/RustFS 服务地址
  endpoint: http://39.97.38.69:9000
  # 面向浏览器的外部访问地址（presigned URL 用，通过 nginx /s3/ 代理）
  # 如果有域名，改为 http://yourdomain.com/s3
  public-endpoint: https://aicrm-saas.5kcrm.cn/s3
  # Access Key
  access-key: minioadmin
  # Secret Key
  secret-key: minioadmin
  # 存储桶名称
  bucket: ai-crm
  # 下载是否使用预签名 URL
  use-presigned-url: true
  # 预签名 URL 有效期（秒）
  presigned-expiry: 3600
  # 注意：console-url 已移除，现在从请求中动态获取

# OIDC Provider 配置 (用于 MinIO SSO 登录)
# 注意：issuer、redirect-uri、frontend-login-url 已改为从请求中动态获取，无需配置
oidc:
  # OIDC 客户端 ID（需与 MinIO 环境变量一致）
  client-id: minio-console
  # OIDC 客户端密钥（需与 MinIO 环境变量一致）
  client-secret: minio-console-secret-key-2024
  # MinIO Console 端口（用于动态生成 redirect_uri）
  minio-console-port: 9001
  # 授权码有效期（秒）
  code-expiry: 300
  # Access Token 有效期（秒）
  token-expiry: 3600
  # Session Cookie 名称
  session-cookie: CRM_SESSION

token-purchase:
  enabled: ${TOKEN_PURCHASE_ENABLED:true}
  order-expire-minutes: ${TOKEN_PURCHASE_ORDER_EXPIRE_MINUTES:30}
  plans:
    - id: starter-5000
      name: 5,000 积分加油包
      description: 5,000 积分
      credit-amount: 5000
      price-fen: 1
      sort: 1
      enabled: true
  wechat:
    enabled: ${TOKEN_PURCHASE_WECHAT_ENABLED:true}
    gateway: ${TOKEN_PURCHASE_WECHAT_GATEWAY:https://api.mch.weixin.qq.com}
    app-id: ${TOKEN_PURCHASE_WECHAT_APP_ID:wxff8239c2bb1632a0}
    merchant-id: ${TOKEN_PURCHASE_WECHAT_MERCHANT_ID:1607069185}
    merchant-serial-no: ${TOKEN_PURCHASE_WECHAT_MERCHANT_SERIAL_NO:770eda7aa17cc5c21c9cc7e9c852ef5ca4f785d9}
    # 商户私钥支持直接填写 PEM 内容，或通过 *_PATH 指向文件；默认目录为当前路径下 src/main/resources/cert
    key-path: ${TOKEN_PURCHASE_WECHAT_KEY_PATH:src/main/resources/cert}
    private-key: ${TOKEN_PURCHASE_WECHAT_PRIVATE_KEY:}
    private-key-path: ${TOKEN_PURCHASE_WECHAT_PRIVATE_KEY_PATH:apiclient_key.pem}
    api-v3-key: ${TOKEN_PURCHASE_WECHAT_API_V3_KEY:c9b0239df3ac48cfb9c7859c66bc315f}
    notify-url: ${TOKEN_PURCHASE_WECHAT_NOTIFY_URL:https://aicrm-saas.5kcrm.cn/crmapi/tokenPurchase/notify/wechat}
  alipay:
    enabled: ${TOKEN_PURCHASE_ALIPAY_ENABLED:true}
    gateway: ${TOKEN_PURCHASE_ALIPAY_GATEWAY:https://openapi.alipay.com/gateway.do}
    app-id: ${TOKEN_PURCHASE_ALIPAY_APP_ID:2021003113634777}
    private-key: ${TOKEN_PURCHASE_ALIPAY_PRIVATE_KEY:}
    alipay-public-key: ${TOKEN_PURCHASE_ALIPAY_PUBLIC_KEY:}
    seller-id: ${TOKEN_PURCHASE_ALIPAY_SELLER_ID:}
    qrcode-width: ${TOKEN_PURCHASE_ALIPAY_QRCODE_WIDTH:200}
    notify-url: ${TOKEN_PURCHASE_ALIPAY_NOTIFY_URL:https://aicrm-saas.5kcrm.cn/crmapi/tokenPurchase/notify/alipay}

# WeKnora 知识库服务配置（多租户隔离：每个 CRM 租户自动注册为 WeKnora 租户）
weknora:
  # 是否启用 WeKnora 集成（设为 false 可禁用，仅使用本地存储）
  enabled: true
  # WeKnora API 基础 URL
  base-url: http://39.97.38.69:89/api/v1
  # 全局 API Key（仅作 fallback，业务调用使用租户专属 API Key）
  api-key: sk-hNd0e76UZU7ep8a-B2lY-VgZ0AL4v9PwT0s1kdCD276Kq7NJ
  # 新租户初始化时自动创建的模型配置
  init-models:
    chat:
      name: qwen3.6-plus
      source: remote
      provider: aliyun
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    embedding:
      name: text-embedding-v4
      source: remote
      provider: aliyun
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      dimension: 1024
  # 搜索配置
  search:
    # 检索返回的最大结果数
    match-count: 5
    # 向量相似度阈值 (0-1)，只返回相似度高于此阈值的结果
    vector-threshold: 0.5
    # 是否启用自动 RAG（启用后每次对话都会自动检索相关文档）
    auto-rag-enabled: true
